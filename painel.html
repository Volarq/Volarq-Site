<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLARQ INDUSTRIAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-main: #121418;
            --card-grad: linear-gradient(145deg, #1e2229, #191c21);
            --shadow-dark: #0a0b0d;
            --shadow-light: #2c313a;
            --green-neon: #cddc39;
            --red-neon: #ff5722;
            --blue-neon: #448aff;
        }

        body {
            background-color: var(--bg-main);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .dashboard {
            width: 350px;
            background-color: #1a1d23;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 20px 20px 60px var(--shadow-dark);
        }

        .header { margin-bottom: 25px; }
        .header h1 { font-size: 24px; margin: 0; color: #a0a5ad; letter-spacing: 1px; }
        .header span { color: #555; font-size: 13px; text-transform: capitalize; }

        .row { display: flex; justify-content: space-between; margin-bottom: 25px; }

        .gauge-card {
            width: 145px;
            background: var(--card-grad);
            border-radius: 20px;
            padding: 15px 0;
            text-align: center;
            box-shadow: inset 2px 2px 5px var(--shadow-light), 5px 5px 15px var(--shadow-dark);
        }

        .gauge-label { font-size: 10px; color: #888; margin-bottom: 10px; display: block; text-transform: uppercase; }
        
        .gauge-display {
            position: relative;
            width: 90px;
            height: 55px;
            margin: 0 auto;
            border-top: 4px solid #111;
            border-radius: 100px 100px 0 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .optico-arc { border-color: var(--green-neon) transparent transparent var(--green-neon); }
        .mq2-arc { border-color: var(--red-neon) transparent transparent transparent; }

        .value { font-size: 28px; font-weight: bold; }
        .c-green { color: var(--green-neon); text-shadow: 0 0 10px rgba(205, 220, 57, 0.3); }
        .c-red { color: var(--red-neon); text-shadow: 0 0 10px rgba(255, 87, 34, 0.3); }

        /* Quick Actions */
        .btn-group { display: flex; justify-content: space-around; margin-bottom: 25px; }
        .btn-wrapper { text-align: center; font-size: 9px; color: #666; font-weight: bold; }

        .round-btn {
            width: 55px; height: 55px;
            border-radius: 50%;
            background: #1a1d23;
            border: 1px solid #2c313a;
            margin-bottom: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 5px 12px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .round-btn:active { box-shadow: inset 3px 3px 6px #000; transform: scale(0.95); }
        
        .icon-pwr { color: #ff9800; font-size: 22px; }
        .icon-spk { color: var(--blue-neon); font-size: 22px; }
        .btn-standby { background: #111; color: #ff9800; font-size: 11px; border: 2px solid #333; }
        .btn-standby.active { color: #5ff555 !important; border-color: #5ff555 !important; }

        /* Chart Section */
        .chart-container {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 15px;
            box-shadow: inset 2px 2px 10px #000;
        }

        #alerta-container { text-align: center; margin-bottom: 15px; min-height: 20px; }
        .fire-alert { color: var(--red-neon); font-weight: bold; font-size: 14px; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>VOLARQ •</h1>
        <span id="fase-status">Conectando...</span>
    </div>

    <div id="alerta-container"></div>

    <div class="row">
        <div class="gauge-card">
            <span class="gauge-label">Valor Óptico</span>
            <div class="gauge-display optico-arc">
                <div class="value c-green" id="optico">0</div>
            </div>
        </div>
        <div class="gauge-card">
            <span class="gauge-label">Valor MQ-2</span>
            <div class="gauge-display mq2-arc">
                <div class="value c-red" id="mq2">0</div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <div class="btn-wrapper">
            <button id="btn-silenciar" class="round-btn" onclick="enviarComando('silenciar')"><span class="icon-pwr">⏻</span></button>
            SILENCIAR
        </div>
        <div class="btn-wrapper">
            <button id="btn-teste" class="round-btn" onclick="enviarComando('teste_buzzer')"><span class="icon-spk">🔊</span></button>
            TESTAR
        </div>
        <div class="btn-wrapper">
            <button id="btn-standby" class="round-btn btn-standby" onclick="enviarComando('standby', true)">OFF</button>
            STAND-BY
        </div>
    </div>

    <div class="chart-container">
        <span class="gauge-label">Histórico Recente</span>
        <canvas id="graficoHistorico"></canvas>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAG_wJMJhJWW-L9HQlCxaSdJLJAF4FN688", databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const devicePath = "volarq/device01/";

    // --- GRÁFICO (Chart.js) ---
    const ctx = document.getElementById('graficoHistorico').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'MQ2', borderColor: '#ff5722', backgroundColor: 'rgba(255,87,34,0.1)', data: [], borderWidth: 2, tension: 0.4, pointRadius: 0 },
                { label: 'Optico', borderColor: '#cddc39', backgroundColor: 'rgba(205,220,57,0.1)', data: [], borderWidth: 2, tension: 0.4, pointRadius: 0 }
            ]
        },
        options: {
            responsive: true,
            scales: {
                x: { display: false },
                y: { grid: { color: '#222' }, ticks: { color: '#555', font: { size: 10 } } }
            },
            plugins: { legend: { display: false } }
        }
    });

    // --- FIREBASE LOGIC ---

    // 1. Sensores em Tempo Real
    db.ref(devicePath + "sensores").on("value", (snap) => {
        const d = snap.val();
        if (d) {
            document.getElementById("mq2").innerText = d.mq2;
            document.getElementById("optico").innerText = d.optico;
        }
    });

    // 2. Histórico (Pega o dia de hoje)
    const hoje = new Date().toISOString().split('T')[0];
    db.ref(devicePath + "historico/" + hoje).limitToLast(10).on("value", (snap) => {
        const hist = snap.val();
        if (!hist) return;

        const labels = Object.keys(hist);
        const dataMQ2 = labels.map(k => hist[k].mq2);
        const dataOpt = labels.map(k => hist[k].optico);

        chart.data.labels = labels;
        chart.data.datasets[0].data = dataMQ2;
        chart.data.datasets[1].data = dataOpt;
        chart.update();
    });

    // 3. Status e Alerta
    db.ref(devicePath + "status/fase").on("value", snap => document.getElementById("fase-status").innerText = snap.val());
    db.ref(devicePath + "alerta/fogo").on("value", snap => {
        document.getElementById("alerta-container").innerHTML = snap.val() ? "<div class='fire-alert'>🔥 INCÊNDIO DETECTADO</div>" : "";
    });

    // 4. Sincronia Botões
    db.ref(devicePath + "comandos").on("value", snap => {
        const c = snap.val();
        document.getElementById("btn-standby").innerText = c.standby ? "ON" : "OFF";
        document.getElementById("btn-standby").classList.toggle("active", c.standby);
    });

    function enviarComando(tipo, isToggle = false) {
        const ref = db.ref(devicePath + "comandos/" + tipo);
        ref.once("value").then(s => {
            const val = s.val();
            if(isToggle) ref.set(!val);
            else { ref.set(true); setTimeout(() => ref.set(false), 1000); }
        });
    }
</script>

</body>
</html>
