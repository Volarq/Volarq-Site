<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VOLARQ INDUSTRIAL MONITOR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Paleta extraída da imagem 2: Neumorfismo Dark */
        :root {
            --bg-color: #1a1c20;
            --card-bg: #1e2126;
            --optico-color: #d4e157; /* Amarelo limão neon */
            --mq2-color: #e53935;    /* Vermelho intenso */
            --text-silver: #a0a5ab;
            /* Sombras Neumórficas */
            --shadow-out: 8px 8px 16px #121417, -8px -8px 16px #262c33;
            --shadow-in: inset 4px 4px 8px #121417, inset -4px -4px 8px #262c33;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Container para alinhar os cards lado a lado como na foto */
        .sensor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px 15px;
            border-radius: 25px;
            box-shadow: var(--shadow-out);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-label {
            color: var(--text-silver);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Efeito de círculo afundado para o valor */
        .value-display {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-in);
            font-size: 1.8rem;
            font-weight: bold;
        }

        /* Cores específicas dos sensores */
        #mq2 { color: var(--mq2-color); text-shadow: 0 0 10px rgba(229, 57, 53, 0.3); }
        #optico { color: var(--optico-color); text-shadow: 0 0 10px rgba(212, 225, 87, 0.3); }

        /* Alerta de Incêndio */
        #alerta {
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-bottom: 20px;
        }

        .alerta {
            color: #ff3333;
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            animation: piscando 1s infinite;
        }

        /* Gráfico */
        canvas {
            background: var(--card-bg);
            border-radius: 25px;
            box-shadow: var(--shadow-out);
            padding: 15px;
            width: 100% !important;
            max-width: 450px;
        }

        @keyframes piscando {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

    <h1>VOLARQ INDUSTRIAL MONITOR</h1>

    <div class="sensor-container">
        <div class="card">
            <div class="card-label">MQ2 (Gás)</div>
            <div class="value-display">
                <span id="mq2">0</span>
            </div>
        </div>

        <div class="card">
            <div class="card-label">Óptico (Fumaça)</div>
            <div class="value-display">
                <span id="optico">0</span>
            </div>
        </div>
    </div>

    <div id="alerta"></div>

    <canvas id="grafico"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAG_wJMJhJWW-L9HQlCxaSdJLJAF4FN688",
            databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Gráfico com as cores da paleta ---
        const ctx = document.getElementById('grafico').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'MQ2',
                    borderColor: '#e53935',
                    data: [],
                    borderWidth: 2,
                    tension: 0.4,
                    pointRadius: 0
                }, {
                    label: 'Óptico',
                    borderColor: '#d4e157',
                    data: [],
                    borderWidth: 2,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#2a2f35' }, ticks: { color: '#70757a' } }
                },
                plugins: { legend: { labels: { color: '#70757a' } } }
            }
        });

        // --- Lógica Firebase ---
        db.ref("volarq/device01/sensores").on("value", (snap) => {
            let dados = snap.val();
            if (dados) {
                document.getElementById("mq2").innerText = dados.mq2;
                document.getElementById("optico").innerText = dados.optico;

                // Atualizar gráfico
                if (chart.data.labels.length > 20) {
                    chart.data.labels.shift();
                    chart.data.datasets[0].data.shift();
                    chart.data.datasets[1].data.shift();
                }
                chart.data.labels.push("");
                chart.data.datasets[0].data.push(dados.mq2);
                chart.data.datasets[1].data.push(dados.optico);
                chart.update();
            }
        });

        db.ref("volarq/device01/alerta/fogo").on("value", (snap) => {
            if (snap.val() == true) {
                document.getElementById("alerta").innerHTML = "<div class='alerta'>⚠️ INCÊNDIO ⚠️</div>";
            } else {
                document.getElementById("alerta").innerHTML = "";
            }
        });
    </script>

</body>
</html>
