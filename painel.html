<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VOLARQ Industrial | Painel</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-cyan: #00f2ff;
            --accent-green: #39ff14;
            --accent-red: #ff3131;
            --accent-yellow: #ffea00;
            --accent-orange: #ff9800;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Roboto', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin: 0;
            color: var(--accent-cyan);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .painel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #30363d;
            text-align: center;
        }

        .valor {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-top: 10px;
            color: var(--text-main);
        }

        .status-container {
            background: #090c10;
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
            border: 1px inset #30363d;
        }

        .led-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #21262d;
            margin-right: 10px;
            border: 2px solid #000;
            transition: 0.3s;
        }

        .on { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .fire { background: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); animation: pulse 0.8s infinite; }
        .standby-on { background: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .controls { display: flex; gap: 10px; margin-bottom: 30px; align-items: center; flex-wrap: wrap; justify-content: center;}

        .btn-action {
            background: #21262d;
            color: var(--text-main);
            border: 1px solid #30363d;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #silenciar-timer {
            font-family: 'Orbitron';
            color: var(--accent-yellow);
            font-size: 0.9rem;
            margin-left: 5px;
            min-width: 45px;
            display: inline-block;
        }

        .slider-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #30363d;
        }

        .slider { -webkit-appearance: none; width: 100%; height: 6px; background: #0d1117; border-radius: 5px; outline: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent-cyan); border-radius: 50%; cursor: pointer; }
    </style>
</head>

<body>

    <div class="header-container">
        <h1>VOLARQ <span style="font-weight:300; color:white">SYS</span></h1>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="painel">
        <div class="card">
            <div style="color: var(--text-dim); font-size: 0.8rem;">MQ2</div>
            <div id="mq2" class="valor">0</div>
        </div>
        <div class="card">
            <div style="color: var(--text-dim); font-size: 0.8rem;">SENSOR ÓPTICO</div>
            <div id="optico" class="valor">0</div>
        </div>
    </div>

    <div class="status-container">
        <div class="led-item"><div id="led_conectado" class="led"></div> CONECTADO</div>
        <div class="led-item"><div id="led_aquecendo" class="led"></div> AQUECENDO</div>
        <div class="led-item"><div id="led_calibrando" class="led"></div> CALIBRANDO</div>
        <div class="led-item"><div id="led_monitorando" class="led"></div> MONITORANDO</div>
        <div class="led-item" style="color:var(--accent-red)"><div id="led_fogo" class="led"></div> FOGO</div>
    </div>

    <div class="controls">
        <button class="btn-action" onclick="silenciar()">
            SILENCIAR <span id="silenciar-timer"></span>
        </button>
        <button class="btn-action" onclick="standby()">
            <div id="led_standby_btn" class="led" style="margin:0"></div> STANDBY
        </button>
        <button class="btn-action" onmousedown="testeBuzzer(true)" onmouseup="testeBuzzer(false)">TESTAR BUZZER</button>
    </div>

    <div class="slider-box">
        <div style="color: var(--text-dim); font-size: 0.8rem; margin-bottom:10px">SENSIBILIDADE</div>
        <input type="range" min="1" max="100" value="50" class="slider" id="slider">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAG_wJMJhJWW-L9HQlCxaSdJLJAF4FN688",
            databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let timerInterval;

        firebase.auth().onAuthStateChanged(function(user){
            if(!user){ window.location="login.html"; }
        });

        /* MONITORAR SENSOR E COMANDOS */
        db.ref().on("value", function(snapshot){
            let allData = snapshot.val();
            let data = allData.sensor;
            let comandos = allData.comandos;

            if(!data){ resetPainel(); return; }

            document.getElementById("mq2").innerHTML = data.mq2 || 0;
            document.getElementById("optico").innerHTML = data.optico || 0;

            toggleLed("led_conectado", data.conectado);
            toggleLed("led_aquecendo", data.aquecendo);
            toggleLed("led_calibrando", data.calibrando);
            toggleLed("led_monitorando", data.monitorando);

            // LED Fogo
            if(data.fogo) document.getElementById("led_fogo").classList.add("fire");
            else document.getElementById("led_fogo").classList.remove("fire");

            // LED Standby (Lendo da aba comandos)
            if(comandos && comandos.standby) document.getElementById("led_standby_btn").classList.add("standby-on");
            else document.getElementById("led_standby_btn").classList.remove("standby-on");
        });

        function toggleLed(id, estado){
            let led = document.getElementById(id);
            if(estado) led.classList.add("on");
            else led.classList.remove("on");
        }

        function silenciar(){
            db.ref("comandos").update({ silenciar: true });
            
            // Lógica do Timer (120 segundos como exemplo)
            clearInterval(timerInterval);
            let tempo = 120;
            const display = document.getElementById("silenciar-timer");
            
            timerInterval = setInterval(() => {
                let minutos = Math.floor(tempo / 60);
                let segundos = tempo % 60;
                display.innerHTML = `${minutos}:${segundos < 10 ? '0' : ''}${segundos}`;
                
                if (--tempo < 0) {
                    clearInterval(timerInterval);
                    display.innerHTML = "";
                    db.ref("comandos").update({ silenciar: false });
                }
            }, 1000);
        }

        function standby(){
            db.ref("comandos/standby").once('value').then(snap => {
                db.ref("comandos").update({ standby: !snap.val() });
            });
        }

        function testeBuzzer(estado){ db.ref("comandos").update({ teste: estado }); }

        document.getElementById("slider").oninput = function(){
            db.ref("config").update({ sensibilidade: this.value });
        }

        function logout(){ firebase.auth().signOut().then(() => window.location="login.html"); }

        function resetPainel(){
            document.getElementById("mq2").innerHTML="0";
            document.getElementById("optico").innerHTML="0";
        }
    </script>
</body>
</html>
