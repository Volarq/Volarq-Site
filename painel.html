<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VOLARQ INDUSTRIAL MONITOR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #1a1c20;
            --card-bg: #1e2126;
            --optico-color: #d4e157; 
            --mq2-color: #e53935;    
            --text-silver: #a0a5ab;
            --shadow-out: 8px 8px 16px #121417, -8px -8px 16px #262c33;
            --shadow-in: inset 4px 4px 8px #121417, inset -4px -4px 8px #262c33;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 10px; }

        /* Estilo do Status Online/Offline */
        #status-box {
            font-size: 0.7rem;
            margin-bottom: 25px;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: var(--shadow-in);
            text-transform: uppercase;
            font-weight: bold;
        }
        .online { color: #4caf50; }
        .offline { color: #f44336; }

        .sensor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px 15px;
            border-radius: 25px;
            box-shadow: var(--shadow-out);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-label {
            color: var(--text-silver);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .value-display {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-in);
            font-size: 1.8rem;
            font-weight: bold;
        }

        #mq2 { color: var(--mq2-color); }
        #optico { color: var(--optico-color); }

        #alerta { width: 100%; max-width: 450px; margin-bottom: 20px; }
        .alerta {
            color: #ff3333;
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            animation: piscando 1s infinite;
        }

        canvas {
            background: var(--card-bg);
            border-radius: 25px;
            box-shadow: var(--shadow-out);
            padding: 15px;
            width: 100% !important;
            max-width: 450px;
        }

        @keyframes piscando {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>VOLARQ INDUSTRIAL</h1>
    
    <div id="status-box" class="offline">
        Sinal: <span id="status-texto">DESCONECTADO</span> | <span id="fase-texto">---</span>
    </div>

    <div class="sensor-container">
        <div class="card">
            <div class="card-label">MQ2 (Gás)</div>
            <div class="value-display"><span id="mq2">0</span></div>
        </div>
        <div class="card">
            <div class="card-label">Óptico (Fumaça)</div>
            <div class="value-display"><span id="optico">0</span></div>
        </div>
    </div>

    <div id="alerta"></div>
    <canvas id="grafico"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAG_wJMJhJWW-L9HQlCxaSdJLJAF4FN688",
            databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Gráfico ---
        const ctx = document.getElementById('grafico').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'MQ2', borderColor: '#e53935', data: [], borderWidth: 2, tension: 0.4, pointRadius: 0 },
                    { label: 'Óptico', borderColor: '#d4e157', data: [], borderWidth: 2, tension: 0.4, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#2a2f35' }, ticks: { color: '#70757a' } }
                }
            }
        });

        // --- Lógica de Monitoramento Centralizada ---
        db.ref("volarq/device01").on("value", (snap) => {
            const data = snap.val();
            if (!data) return;

            // 1. Atualiza Sensores
            document.getElementById("mq2").innerText = data.sensores.mq2;
            document.getElementById("optico").innerText = data.sensores.optico;
            document.getElementById("fase-texto").innerText = data.status.fase.toUpperCase();

            // 2. Heartbeat (Online/Offline)
            const diff = (Date.now() - data.status.timestamp) / 1000;
            const statusBox = document.getElementById("status-box");
            const statusTexto = document.getElementById("status-texto");
            
            if (diff < 15) { // Online se recebeu sinal nos últimos 15s
                statusBox.className = "online";
                statusTexto.innerText = "ONLINE";
            } else {
                statusBox.className = "offline";
                statusTexto.innerText = "OFFLINE";
            }

            // 3. Alerta de Fogo
            document.getElementById("alerta").innerHTML = data.alerta.fogo ? 
                "<div class='alerta'>⚠️ INCÊNDIO DETECTADO ⚠️</div>" : "";

            // 4. Atualizar Gráfico
            if (chart.data.labels.length > 25) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
                chart.data.datasets[1].data.shift();
            }
            chart.data.labels.push("");
            chart.data.datasets[0].data.push(data.sensores.mq2);
            chart.data.datasets[1].data.push(data.sensores.optico);
            chart.update();
        });
    </script>
</body>
</html>
