<!DOCTYPE html>
<html>
<head>
    <title>VOLARQ INDUSTRIAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background:#0b0f14; color:#00e5ff; font-family:Arial; text-align: center; }
        .card { background:#111827; padding:20px; margin:10px; border-radius:10px; border:1px solid #00e5ff; display: inline-block; min-width: 150px; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        .online { background: #00ff0033; color: #00ff00; }
        .offline { background: #ff000033; color: #ff0000; }
        .alerta { color:red; font-size:40px; animation:piscando 1s infinite; font-weight: bold; }
        @keyframes piscando { 0%{opacity:1} 50%{opacity:0} 100%{opacity:1} }
        canvas { max-width: 800px; margin: 20px auto; background: #111827; }
    </style>
</head>
<body>

    <h1>VOLARQ INDUSTRIAL MONITOR</h1>
    
    <div id="status-container">
        Status: <span id="status-text" class="status-badge offline">VERIFICANDO...</span>
    </div>

    <div class="card">MQ2: <br><span id="mq2">0</span></div>
    <div class="card">ÓPTICO: <br><span id="optico">0</span></div>

    <div id="alerta"></div>

    <div style="width:90%; max-width:800px; margin:auto;">
        <canvas id="grafico"></canvas>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAG_wJMJhJWW-L9HQlCxaSdJLJAF4FN688", databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Lógica do Gráfico ---
    const ctx = document.getElementById('grafico').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'MQ2', borderColor: '#00e5ff', data: [], fill: false },
                { label: 'Óptico', borderColor: '#ff00ff', data: [], fill: false }
            ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    // --- Monitoramento de Dados e Heartbeat ---
    db.ref("volarq/device01").on("value", (snap) => {
        const data = snap.val();
        if(!data) return;

        // Atualiza números
        document.getElementById("mq2").innerText = data.sensores.mq2;
        document.getElementById("optico").innerText = data.sensores.optico;

        // Atualiza Gráfico (Mantém os últimos 20 pontos)
        const agora = new Date().toLocaleTimeString();
        chart.data.labels.push(agora);
        chart.data.datasets[0].data.push(data.sensores.mq2);
        chart.data.datasets[1].data.push(data.sensores.optico);
        if(chart.data.labels.length > 20) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
            chart.data.datasets[1].data.shift();
        }
        chart.update();

        // Lógica de Alerta
        const alertaDiv = document.getElementById("alerta");
        alertaDiv.innerHTML = data.alerta?.fogo ? "<div class='alerta'>INCÊNDIO DETECTADO</div>" : "";

        // Verificação de Heartbeat (Timeout de 15 segundos)
        const lastTimestamp = data.status?.timestamp;
        const deviceTime = new Date(lastTimestamp);
        const diff = (Date.now() - lastTimestamp) / 1000;

        const statusLabel = document.getElementById("status-text");
        if (diff < 15) {
            statusLabel.innerText = "ONLINE";
            statusLabel.className = "status-badge online";
        } else {
            statusLabel.innerText = "DISPOSITIVO OFFLINE";
            statusLabel.className = "status-badge offline";
        }
    });
</script>
</body>
</html>
