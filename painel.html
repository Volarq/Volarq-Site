<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VOLARQ Industrial Monitor</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0f14;
            --card-bg: linear-gradient(145deg, #1a1f26, #14181f);
            --accent-green: #d4ff00;
            --accent-red: #ff4444;
            --text-gray: #8b949e;
            --shadow: 5px 5px 15px #05070a, -2px -2px 10px #1e252e;
            --shadow-inset: inset 2px 2px 5px #05070a, inset -1px -1px 3px #1e252e;
        }

        body { background-color: var(--bg-color); color: white; font-family: 'Roboto', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        #emergency-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.2); z-index: 999; pointer-events: none; border: 15px solid var(--accent-red); box-sizing: border-box; animation: blink-red 0.5s infinite alternate; }
        @keyframes blink-red { from { opacity: 0.2; } to { opacity: 1; } }
        .fire-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron'; font-size: 2rem; color: white; text-shadow: 0 0 20px #ff0000; text-align: center; width: 100%; }

        .top-bar { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-family: 'Orbitron'; font-size: 1.2rem; letter-spacing: 2px; margin: 0; }
        
        .logout-btn { background: var(--card-bg); border: 1px solid #21262d; width: 35px; height: 35px; border-radius: 8px; color: var(--text-gray); cursor: pointer; box-shadow: var(--shadow); }

        .status-bar { background: var(--card-bg); width: 100%; max-width: 460px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-around; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid #21262d; box-sizing: border-box; }
        .status-item { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; text-transform: uppercase; color: var(--text-gray); }
        .led { width: 10px; height: 10px; border-radius: 50%; background: gray; transition: 0.3s; }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 460px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid #21262d; text-align: center; box-sizing: border-box; }
        .value { font-family: 'Orbitron'; font-size: 2rem; margin: 10px 0; }

        .actions-row { display: flex; justify-content: space-around; width: 100%; max-width: 460px; margin: 25px 0; }
        .btn-action { width: 75px; height: 75px; border-radius: 50%; border: none; background: var(--card-bg); box-shadow: var(--shadow); color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-action:active { box-shadow: var(--shadow-inset); transform: scale(0.95); }
        .btn-action span { font-size: 0.55rem; text-transform: uppercase; font-weight: bold; }
        
        #timer-display { font-size: 0.6rem; color: var(--accent-red); font-family: 'Orbitron'; display: none; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: #0a0d11; height: 6px; border-radius: 5px; outline: none; box-shadow: var(--shadow-inset); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent-green); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--accent-green); }
    </style>
</head>
<body>

    <div id="emergency-overlay">
        <div class="fire-text"><i class="fas fa-exclamation-triangle"></i><br>FOGO DETECTADO</div>
    </div>

    <div class="top-bar">
        <h1>VOLARQ <span style="color:var(--accent-green)">•</span></h1>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>

    <div class="status-bar">
        <div class="status-item"><div id="ledCon" class="led"></div> Con</div>
        <div class="status-item"><div id="ledCal" class="led"></div> Cal</div>
        <div class="status-item"><div id="ledFire" class="led"></div> Fire</div>
    </div>

    <div class="grid-container">
        <div class="card"><div style="font-size:0.6rem; color:var(--text-gray)">ÓPTICO</div><div id="optico" class="value" style="color:var(--accent-green)">0</div></div>
        <div class="card"><div style="font-size:0.6rem; color:var(--text-gray)">MQ2</div><div id="mq2" class="value" style="color:var(--accent-red)">0</div></div>
        <div class="card wide-card"><canvas id="grafico" style="height: 120px;"></canvas></div>
        <div class="card wide-card"><input type="range" min="0" max="200" id="sens"></div>
    </div>

    <div class="actions-row">
        <button class="btn-action" onclick="verificarFogo()" style="color:var(--accent-green)">
            <i class="fas fa-check-double"></i>
            <span>Verificado</span>
            <div id="timer-display">120s</div>
        </button>
        <button class="btn-action" onclick="standby()" style="color:#00d4ff"><i class="fas fa-pause"></i><span>Standby</span></button>
        <button class="btn-action" onclick="teste()" style="color:var(--accent-red)"><i class="fas fa-bullhorn"></i><span>Teste</span></button>
    </div>

    <script>
        // Inicialização Firebase
        const firebaseConfig = { apiKey: "SUA_API", databaseURL: "SUA_URL" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // EmailJS (Configure no site emailjs.com)
        emailjs.init("SEU_USER_ID_EMAILJS");

        let ultimoTempo = Date.now();
        let modoFogoSuspenso = false;
        let emailEnviado = false;

        // --- LISTENER PRINCIPAL ---
        db.ref("devices/volarq1").on("value", (snap) => {
            let d = snap.val();
            if(!d) return;

            // Watchdog Update
            ultimoTempo = Date.now();

            // Atualiza Valores
            document.getElementById("optico").innerHTML = d.optico || 0;
            document.getElementById("mq2").innerHTML = d.mq2 || 0;

            // LEDs
            document.getElementById("ledCon").style.background = d.conectado ? "green" : "gray";
            document.getElementById("ledCal").style.background = d.calibrado ? "green" : "gray";
            document.getElementById("ledFire").style.background = d.fogo ? "red" : "gray";

            // Lógica de Fogo e Email
            const overlay = document.getElementById("emergency-overlay");
            if(d.fogo && !modoFogoSuspenso) {
                overlay.style.display = "block";
                enviarEmailAlerta();
            } else {
                overlay.style.display = "none";
            }
            
            // Reset do flag de email se o fogo apagar
            if(!d.fogo) emailEnviado = false;
        });

        // --- DETECTOR DE DESCONEXÃO ---
        setInterval(() => {
            let agora = Date.now();
            if(agora - ultimoTempo > 5000) {
                document.getElementById("optico").innerHTML = 0;
                document.getElementById("mq2").innerHTML = 0;
                document.getElementById("ledCon").style.background = "gray";
                document.getElementById("ledCal").style.background = "gray";
                document.getElementById("ledFire").style.background = "gray";
                document.getElementById("emergency-overlay").style.display = "none";
            }
        }, 2000);

        // --- FUNÇÃO VERIFICADO (MUTE 2 MIN) ---
        function verificarFogo() {
            modoFogoSuspenso = true;
            let tempoRestante = 120;
            const timerDiv = document.getElementById("timer-display");
            
            timerDiv.style.display = "block";
            db.ref("devices/volarq1").update({ silenciar: true });

            let intervalo = setInterval(() => {
                tempoRestante--;
                timerDiv.innerText = tempoRestante + "s";
                
                if(tempoRestante <= 0) {
                    clearInterval(intervalo);
                    modoFogoSuspenso = false;
                    timerDiv.style.display = "none";
                }
            }, 1000);
        }

        // --- ENVIO DE EMAIL ---
        function enviarEmailAlerta() {
            if(emailEnviado) return; // Evita spam de e-mails
            
            emailEnviado = true;
            const params = {
                to_email: "volarq.oficial@gmail.com",
                message: "ALERTA CRÍTICO: Fogo detectado no sensor VOLARQ 1!"
            };

            // Nota: Você deve configurar um 'Service ID' e 'Template ID' no EmailJS
            emailjs.send("service_id", "template_id", params)
                .then(() => console.log("Email enviado com sucesso!"))
                .catch((err) => console.log("Erro ao enviar email", err));
        }

        // Outras funções
        function standby() { db.ref("devices/volarq1").update({standby: true}); }
        function teste() { db.ref("devices/volarq1").update({buzzer_manual: true}); }
        document.getElementById("sens").oninput = function() { db.ref("devices/volarq1").update({sensibilidade: this.value}); };
        function logout() { firebase.auth().signOut().then(() => window.location = "login.html"); }
    </script>
</body>
</html>
