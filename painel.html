<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>VOLARQ INDUSTRIAL - DASHBOARD V3</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0f14; color: #00e5ff; font-family: sans-serif; padding: 20px; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .card { background: #111827; padding: 20px; border: 1px solid #00e5ff; border-radius: 10px; min-width: 200px; }
        .btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .fogo-alerta { background: red; color: white; padding: 20px; animation: flash 0.5s infinite; border-radius: 10px; display: none; }
        @keyframes flash { 0% {opacity:1} 50% {opacity:0.5} 100% {opacity:1} }
    </style>
</head>
<body>
    <h1>SISTEMA VOLARQ INDUSTRIAL</h1>
    <div id="statusFogo" class="fogo-alerta">🔥 INCÊNDIO DETECTADO 🔥</div>

    <div class="grid">
        <div class="card">GAS MQ2 <br><span id="valMQ2" style="font-size: 2em;">0</span></div>
        <div class="card">ÓPTICO <br><span id="valOpt" style="font-size: 2em;">0</span></div>
        
        <div class="card" style="border-color: #ff9800;">
            COMANDOS
            <button class="btn" style="background: #ff9800;" onclick="cmd('silenciar', true)">SILENCIAR</button>
            <button class="btn" style="background: #4caf50;" onclick="cmd('teste_buzzer', true)">TESTAR BUZZER</button>
            <button id="btnStby" class="btn" style="background: #607d8b;" onclick="toggleStby()">STANDBY: OFF</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "SUA_API_KEY", databaseURL: "SUA_URL" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // RECEBER DADOS
        db.ref("volarq/device01").on("value", snap => {
            const d = snap.val();
            document.getElementById("valMQ2").innerText = d.sensores.mq2;
            document.getElementById("valOpt").innerText = d.sensores.optico;
            document.getElementById("statusFogo").style.display = d.alerta.fogo ? "block" : "none";
        });

        // ENVIAR COMANDOS
        function cmd(campo, valor) {
            db.ref(`volarq/device01/comandos/${campo}`).set(valor);
            if(campo === 'silenciar') setTimeout(() => db.ref(`volarq/device01/comandos/silenciar`).set(false), 5000);
        }

        let stby = false;
        function toggleStby() {
            stby = !stby;
            db.ref("volarq/device01/comandos/standby").set(stby);
            document.getElementById("btnStby").innerText = stby ? "STANDBY: ON" : "STANDBY: OFF";
            document.getElementById("btnStby").style.background = stby ? "#f44336" : "#607d8b";
        }
    </script>
</body>
</html>
