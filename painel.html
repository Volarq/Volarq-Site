<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VOLARQ Industrial Monitor</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #0b0f14;
            --card-bg: linear-gradient(145deg, #1a1f26, #14181f);
            --accent-green: #d4ff00;
            --accent-red: #ff4444;
            --accent-blue: #00d4ff;
            --text-gray: #8b949e;
            --shadow: 5px 5px 15px #05070a, -2px -2px 10px #1e252e;
            --shadow-inset: inset 2px 2px 5px #05070a, inset -1px -1px 3px #1e252e;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- ALERTA DE FOGO (OVERLAY) --- */
        #emergency-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.2);
            z-index: 999;
            pointer-events: none;
            border: 15px solid var(--accent-red);
            box-sizing: border-box;
            animation: blink-red 0.5s infinite alternate;
        }

        @keyframes blink-red { from { opacity: 0.2; } to { opacity: 1; } }

        .fire-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron';
            font-size: 2.5rem;
            color: white;
            text-shadow: 0 0 20px #ff0000;
            text-align: center;
            width: 100%;
        }

        /* --- LAYOUT --- */
        .top-bar { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-family: 'Orbitron'; font-size: 1.2rem; letter-spacing: 2px; margin: 0; }
        
        .logout-btn { background: var(--card-bg); border: 1px solid #21262d; width: 35px; height: 35px; border-radius: 8px; color: var(--text-gray); cursor: pointer; box-shadow: var(--shadow); }

        .status-bar { background: var(--card-bg); width: 100%; max-width: 460px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-around; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid #21262d; }
        .status-item { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; text-transform: uppercase; color: var(--text-gray); }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #333; transition: 0.3s; box-shadow: inset 0 0 5px #000; }
        
        /* Classes de estado dos LEDs */
        .led-green { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .led-red { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); }
        .led-off { background: #333; box-shadow: inset 0 0 5px #000; }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 460px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid #21262d; text-align: center; }
        .label { color: var(--text-gray); font-size: 0.65rem; text-transform: uppercase; }
        .value { font-family: 'Orbitron'; font-size: 2rem; margin: 10px 0; }
        .wide-card { grid-column: span 2; padding: 15px; }

        .actions-row { display: flex; justify-content: space-around; width: 100%; max-width: 460px; margin: 25px 0; }
        .btn-action { width: 65px; height: 65px; border-radius: 50%; border: none; background: var(--card-bg); box-shadow: var(--shadow); color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; font-size: 1rem; transition: 0.2s; }
        .btn-action:active { box-shadow: var(--shadow-inset); transform: scale(0.95); }
        .btn-action span { font-size: 0.5rem; text-transform: uppercase; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: #0a0d11; height: 6px; border-radius: 5px; outline: none; box-shadow: var(--shadow-inset); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent-green); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--accent-green); }

    </style>
</head>
<body>

    <div id="emergency-overlay">
        <div class="fire-text"><i class="fas fa-exclamation-triangle"></i><br>FOGO DETECTADO</div>
    </div>

    <div class="top-bar">
        <h1>VOLARQ <span style="color:var(--accent-green)">•</span></h1>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>

    <div class="status-bar">
        <div class="status-item"><div id="ledCon" class="led"></div> Con</div>
        <div class="status-item"><div id="ledCal" class="led"></div> Cal</div>
        <div class="status-item"><div id="ledFire" class="led"></div> Fire</div>
    </div>

    <div class="grid-container">
        <div class="card">
            <div class="label">Óptico</div>
            <div id="optico" class="value" style="color:var(--accent-green)">0</div>
        </div>
        <div class="card">
            <div class="label">MQ-2</div>
            <div id="mq2" class="value" style="color:var(--accent-red)">0</div>
        </div>

        <div class="card wide-card">
            <div class="label" style="margin-bottom:15px">Histórico MQ-2</div>
            <canvas id="grafico" style="max-height: 150px;"></canvas>
        </div>

        <div class="card wide-card">
            <div class="label">Ajuste de Sensibilidade</div>
            <input type="range" min="0" max="200" id="sens" style="margin: 15px 0;">
        </div>
    </div>

    <div class="actions-row">
        <button class="btn-action" onclick="silenciar()" style="color:#ffa500">
            <i class="fas fa-bell-slash"></i><span>Mute</span>
        </button>
        <button class="btn-action" onclick="standby()" style="color:var(--accent-blue)">
            <i class="fas fa-pause"></i><span>Standby</span>
        </button>
        <button class="btn-action" onclick="teste()" style="color:var(--accent-red)">
            <i class="fas fa-bullhorn"></i><span>Teste</span>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAG_wJMJhJWW-L9HQlCxaSdJLJAF4FN688",
            databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        firebase.auth().onAuthStateChanged((user) => {
            if (!user) window.location = "login.html";
        });

        /* --- LÓGICA DE MONITORAMENTO E WATCHDOG --- */
        let ultimoUpdate = 0;

        db.ref("devices/volarq1").on("value", (snap) => {
            let d = snap.val();
            if(!d) return;

            // Atualização dos valores
            document.getElementById("optico").innerHTML = d.optico || 0;
            document.getElementById("mq2").innerHTML = d.mq2 || 0;

            // Timestamp para o Watchdog
            ultimoUpdate = Date.now();

            // LEDs de Status (Com estilos visuais)
            document.getElementById("ledCon").className = d.conectado ? "led led-green" : "led led-off";
            document.getElementById("ledCal").className = d.calibrado ? "led led-green" : "led led-off";
            document.getElementById("ledFire").className = d.fogo ? "led led-red" : "led led-off";

            // Overlay de Emergência
            const overlay = document.getElementById("emergency-overlay");
            overlay.style.display = d.fogo ? "block" : "none";
        });

        // Verificação de Conexão (Watchdog)
        setInterval(() => {
            let agora = Date.now();
            if(agora - ultimoUpdate > 5000) {
                // Sensor Offline - Limpa a tela
                document.getElementById("optico").innerHTML = 0;
                document.getElementById("mq2").innerHTML = 0;
                document.getElementById("ledCon").className = "led led-off";
                document.getElementById("ledCal").className = "led led-off";
                document.getElementById("ledFire").className = "led led-off";
                document.getElementById("emergency-overlay").style.display = "none";
            }
        }, 2000);

        /* --- FUNÇÕES DE CONTROLE --- */
        function silenciar() { db.ref("devices/volarq1").update({silenciar: true}); }
        function standby() { db.ref("devices/volarq1").update({standby: true}); }
        function teste() { db.ref("devices/volarq1").update({buzzer_manual: true}); }

        document.getElementById("sens").oninput = function() {
            db.ref("devices/volarq1").update({sensibilidade: this.value});
        };

        function logout() {
            firebase.auth().signOut().then(() => { window.location = "login.html"; });
        }

        /* --- CONFIGURAÇÃO DO GRÁFICO --- */
        var ctx = document.getElementById("grafico").getContext('2d');
        var chart = new Chart(ctx, {
            type: "line",
            data: {
                labels: [],
                datasets: [{
                    label: "Nível MQ2",
                    borderColor: "#ff4444",
                    backgroundColor: "rgba(255, 68, 68, 0.1)",
                    data: [],
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { grid: { color: "#222" }, ticks: { color: "#555" } }
                },
                plugins: { legend: { display: false } }
            }
        });

        db.ref("logs/eventos").limitToLast(20).on("child_added", (snap) => {
            let d = snap.val();
            chart.data.labels.push(new Date().toLocaleTimeString());
            chart.data.datasets[0].data.push(d.mq2);
            if(chart.data.labels.length > 20) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.update();
        });
    </script>
</body>
</html>
