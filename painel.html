<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLARQ INDUSTRIAL PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 15px; flex: 1; min-width: 140px; }
        .val { font-family: 'Orbitron'; font-size: 2rem; color: #00f2ff; }
        
        .btn { padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; max-width: 350px; margin: 10px 0; font-size: 1rem; text-transform: uppercase; }
        .btn-normal { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
        .btn-active { background: #da3633 !important; color: white; box-shadow: 0 0 15px #da3633; }
        .btn-test { background: #238636; color: white; }
        
        #alertaBox { display: none; background: rgba(218,54,51,0.2); border: 2px solid #da3633; padding: 20px; border-radius: 12px; font-family: 'Orbitron'; color: #da3633; margin: 20px auto; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } }
        #chart-container { background: #161b22; padding: 10px; border-radius: 15px; margin: 20px auto; max-width: 800px; height: 250px; }
    </style>
</head>
<body>

    <h2 style="font-family: 'Orbitron'; color: #00f2ff;">VOLARQ PRO</h2>
    <div id="stTxt" style="font-size: 12px; color: #da3633;">OFFLINE</div>

    <div id="alertaBox">⚠️ ALERTA DE INCÊNDIO ⚠️</div>

    <div class="grid">
        <div class="card"><small>GÁS MQ2</small><div id="vMQ2" class="val">0</div></div>
        <div class="card"><small>ÓPTICO</small><div id="vOpt" class="val" style="color: #ff0055;">0</div></div>
    </div>

    <div id="chart-container"><canvas id="grafico"></canvas></div>

    <div style="display: flex; flex-direction: column; align-items: center;">
        <button id="bTst" class="btn btn-test" onclick="toggleCmd('teste_buzzer')">🔊 TESTAR BUZZER</button>
        <button id="bSil" class="btn btn-normal" style="background: #d29922; color: white;" onclick="silenciar()">🔕 SILENCIAR (1 MIN)</button>
        <button id="bStd" class="btn btn-normal" onclick="toggleCmd('standby')">🌙 MODO STANDBY</button>
    </div>

    <script>
        const config = { databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // --- Gráfico ---
        const ctx = document.getElementById('grafico').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'MQ2', borderColor: '#00f2ff', data: [], tension: 0.4, pointRadius: 0 },
                { label: 'Opt', borderColor: '#ff0055', data: [], tension: 0.4, pointRadius: 0 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#21262d' } } } }
        });

        let estados = { standby: false, teste_buzzer: false };

        db.ref("volarq/device01").on("value", snap => {
            const d = snap.val();
            if(!d) return;

            // Watchdog e Offline
            const agora = Date.now();
            if (agora - d.status.ultimo_check > 10000) {
                document.getElementById("vMQ2").innerText = "0";
                document.getElementById("vOpt").innerText = "0";
                document.getElementById("stTxt").innerText = "OFFLINE";
                document.getElementById("alertaBox").style.display = "none";
                return;
            }

            document.getElementById("stTxt").innerText = "ONLINE";
            document.getElementById("stTxt").style.color = "#238636";
            document.getElementById("vMQ2").innerText = d.sensores.mq2;
            document.getElementById("vOpt").innerText = d.sensores.optico;

            // Toggles
            estados.standby = d.comandos?.standby || false;
            estados.teste_buzzer = d.comandos?.teste_buzzer || false;
            const fogo = d.alerta?.fogo || false;
            const silenciando = d.comandos?.silenciar || false;

            // Alerta visual
            document.getElementById("alertaBox").style.display = (fogo && !silenciando && !estados.standby) ? "block" : "none";

            // Estilo Botões
            document.getElementById("bStd").className = estados.standby ? "btn btn-active" : "btn btn-normal";
            document.getElementById("bStd").innerText = estados.standby ? "☀️ ATIVAR SISTEMA" : "🌙 MODO STANDBY";
            
            document.getElementById("bTst").className = estados.teste_buzzer ? "btn btn-active" : "btn btn-test";
            document.getElementById("bTst").innerText = estados.teste_buzzer ? "🛑 PARAR TESTE" : "🔊 TESTAR BUZZER";

            // Gráfico
            if(chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); chart.data.datasets[1].data.shift(); }
            chart.data.labels.push("");
            chart.data.datasets[0].data.push(d.sensores.mq2);
            chart.data.datasets[1].data.push(d.sensores.optico);
            chart.update('none');
        });

        function toggleCmd(c) { db.ref(`volarq/device01/comandos/${c}`).set(!estados[c]); }

        function silenciar() {
            db.ref("volarq/device01/comandos/silenciar").set(true);
            const b = document.getElementById("bSil");
            b.innerText = "SILENCIADO...";
            b.classList.add("btn-active");
            setTimeout(() => {
                db.ref("volarq/device01/comandos/silenciar").set(false);
                b.innerText = "🔕 SILENCIAR (1 MIN)";
                b.classList.remove("btn-active");
            }, 60000);
        }
    </script>
</body>
</html>
