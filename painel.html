<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VOLARQ Painel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>

body{
background:#0b0f14;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

.painel{

display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:30px;

}

.card{

background:#161b22;
padding:20px;
margin:10px;
border-radius:10px;
width:180px;

}

.valor{

font-size:35px;
margin-top:10px;

}

.led{

width:15px;
height:15px;
border-radius:50%;
background:#333;
display:inline-block;
margin-left:5px;

}

.on{

background:#00ff9c;

}

.fire{

background:red;

}

button{

padding:10px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;

}

.slider{

width:200px;

}

.logout{

position:absolute;
top:15px;
right:20px;

}

</style>

</head>

<body>

<button class="logout" onclick="logout()">Sair</button>

<h1>VOLARQ Painel de Monitoramento</h1>

<div class="painel">

<div class="card">

MQ2

<div id="mq2" class="valor">0</div>

</div>

<div class="card">

Sensor Óptico

<div id="optico" class="valor">0</div>

</div>

</div>

<br>

Conectado <span id="led_conectado" class="led"></span>

Aquecendo <span id="led_aquecendo" class="led"></span>

Calibrando <span id="led_calibrando" class="led"></span>

Monitorando <span id="led_monitorando" class="led"></span>

FOGO <span id="led_fogo" class="led"></span>

<br><br>

<button onclick="silenciar()">Silenciar</button>

<button onclick="standby()">Standby</button>

<button onmousedown="testeBuzzer(true)" onmouseup="testeBuzzer(false)">Teste buzzer</button>

<br><br>

Sensibilidade

<br>

<input type="range" min="1" max="100" value="50" class="slider" id="slider">

<script>

const firebaseConfig = {

apiKey: "AIzaSyAG_wJMJhJWW-L9HQlCxaSdJLJAF4FN688",

databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* PROTEÇÃO LOGIN */

firebase.auth().onAuthStateChanged(function(user){

if(!user){

window.location="login.html";

}

});

/* RESET DO PAINEL */

function resetPainel(){

document.getElementById("mq2").innerHTML="0";
document.getElementById("optico").innerHTML="0";

document.getElementById("led_conectado").classList.remove("on");
document.getElementById("led_aquecendo").classList.remove("on");
document.getElementById("led_calibrando").classList.remove("on");
document.getElementById("led_monitorando").classList.remove("on");
document.getElementById("led_fogo").classList.remove("fire");

}

/* MONITORAR SENSOR */

db.ref("sensor").on("value", function(snapshot){

let data = snapshot.val();

if(!data){

resetPainel();
return;

}

/* VERIFICAR TEMPO DA ULTIMA LEITURA */

if(data.ultima_leitura){

let agora = Date.now();

if((agora - data.ultima_leitura) > 10000){

resetPainel();
return;

}

}

/* VALORES */

document.getElementById("mq2").innerHTML = data.mq2 || 0;
document.getElementById("optico").innerHTML = data.optico || 0;

/* LEDS */

toggleLed("led_conectado", data.conectado);
toggleLed("led_aquecendo", data.aquecendo);
toggleLed("led_calibrando", data.calibrando);
toggleLed("led_monitorando", data.monitorando);

/* FOGO */

if(data.fogo){

document.getElementById("led_fogo").classList.add("fire");

}else{

document.getElementById("led_fogo").classList.remove("fire");

}

});

/* FUNÇÃO LED */

function toggleLed(id,estado){

let led = document.getElementById(id);

if(estado){

led.classList.add("on");

}else{

led.classList.remove("on");

}

}

/* BOTÕES */

function silenciar(){

db.ref("comandos").update({

silenciar:true

});

}

function standby(){

db.ref("comandos").update({

standby:true

});

}

function testeBuzzer(estado){

db.ref("comandos").update({

teste:estado

});

}

/* SLIDER */

document.getElementById("slider").oninput = function(){

db.ref("config").update({

sensibilidade:this.value

});

}

/* LOGOUT */

function logout(){

firebase.auth().signOut().then(function(){

window.location="login.html";

});

}

</script>

</body>

</html>
