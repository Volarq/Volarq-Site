<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VOLARQ Industrial | Dashboard Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00e5ff; --danger: #ff3e3e; --success: #3fb950; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .header { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { font-family: 'Orbitron'; color: var(--accent); letter-spacing: 3px; margin: 0; }
        
        /* Alerta Dinâmico */
        #alertBar { 
            display: none; background: rgba(255, 62, 62, 0.15); border: 2px solid var(--danger); 
            color: var(--danger); padding: 20px; border-radius: 12px; font-family: 'Orbitron';
            font-size: 1.4rem; text-align: center; margin-bottom: 25px; animation: pulse 1.5s infinite;
        }
        .mute-mode { border-color: #484f58 !important; color: #8b949e !important; animation: none !important; background: #21262d !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(255, 62, 62, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 16px; padding: 25px; text-align: left; }
        .val { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--accent); display: block; margin: 10px 0; }
        
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-test { background: var(--success); }
        .btn-silence { background: #d29922; }
        .btn-stby { background: #30363d; }
        .stby-active { background: var(--danger) !important; }
    </style>
</head>
<body>

    <header class="header">
        <h1>VOLARQ <span style="font-weight: 300;">PRO</span></h1>
        <div id="heartbeat" style="font-size: 0.8rem; color: #8b949e; margin-top: 10px;">Aguardando sinal do dispositivo...</div>
    </header>

    <div id="alertBar">⚠️ ALERTA DETECÇÃO EM ANDAMENTO ⚠️</div>

    <div class="grid">
        <div class="card">
            <span style="color: #8b949e; font-size: 0.8rem; font-weight: bold;">GÁS & FUMAÇA (MQ2)</span>
            <span class="val" id="mq2Val">000</span>
            <div id="faseTxt" style="color: var(--success); font-size: 0.8rem;">Fase: Inicializando</div>
        </div>

        <div class="card">
            <span style="color: #8b949e; font-size: 0.8rem; font-weight: bold;">PARTÍCULAS (ÓPTICO)</span>
            <span class="val" id="optVal" style="color: #ff0055;">000</span>
            <button class="btn btn-test" onclick="cmd('teste_buzzer', true)">🔊 TESTAR BUZZER</button>
        </div>

        <div class="card">
            <span style="color: #8b949e; font-size: 0.8rem; font-weight: bold;">CONTROLES DE OPERAÇÃO</span>
            <button class="btn btn-silence" onclick="cmd('silenciar', true)">🔕 SILENCIAR AGORA</button>
            <button id="stbyBtn" class="btn btn-stby" onclick="toggleStby()">🌙 MODO STANDBY</button>
            <button class="btn" style="background: #21262d;" onclick="downloadCSV()">📥 EXPORTAR CSV</button>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <canvas id="mainChart" height="100"></canvas>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyAG_wJMJhJWW-L9HQlCxaSdJLJAF4FN688", databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let csvData = [];
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let alarmLoop;

        // --- SISTEMA DE ÁUDIO ---
        function playAlarm() {
            if (alarmLoop) return;
            alarmLoop = setInterval(() => {
                let o = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                o.type = 'sawtooth'; o.frequency.value = 1000;
                o.connect(g); g.connect(audioCtx.destination);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
                o.start(); o.stop(audioCtx.currentTime + 0.5);
            }, 600);
        }
        function stopAlarm() { clearInterval(alarmLoop); alarmLoop = null; }

        // --- GRÁFICO ---
        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'MQ2', borderColor: '#00e5ff', data: [] }, { label: 'Óptico', borderColor: '#ff0055', data: [] }] },
            options: { responsive: true, scales: { y: { grid: { color: '#30363d' } }, x: { display: false } } }
        });

        // --- REALTIME ---
        db.ref("volarq/device01").on("value", snap => {
            const d = snap.val();
            if(!d) return;

            document.getElementById("mq2Val").innerText = d.sensores.mq2;
            document.getElementById("optVal").innerText = d.sensores.optico;
            document.getElementById("faseTxt").innerText = "Fase: " + d.status.fase;
            
            // Heartbeat
            const last = new Date(d.status.ultimo_check).toLocaleTimeString();
            document.getElementById("heartbeat").innerText = "Sinal Online às: " + last;

            // Lógica de Alerta
            const fogo = d.alerta.fogo;
            const mudo = d.comandos?.silenciar || d.comandos?.standby;
            const bar = document.getElementById("alertBar");

            if (fogo) {
                bar.style.display = "block";
                if (mudo) { bar.classList.add("mute-mode"); stopAlarm(); }
                else { bar.classList.remove("mute-mode"); playAlarm(); }
            } else {
                bar.style.display = "none"; stopAlarm();
            }

            // Gráfico e CSV
            const time = new Date().toLocaleTimeString();
            if(chart.data.labels.length > 50) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); chart.data.datasets[1].data.shift(); }
            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(d.sensores.mq2);
            chart.data.datasets[1].data.push(d.sensores.optico);
            chart.update('none');

            csvData.push([time, d.sensores.mq2, d.sensores.optico, fogo ? "SIM" : "NAO"].join(","));

            // Botão Standby
            const sBtn = document.getElementById("stbyBtn");
            if(d.comandos?.standby) { sBtn.classList.add("stby-active"); sBtn.innerText = "☀️ DESATIVAR STANDBY"; }
            else { sBtn.classList.remove("stby-active"); sBtn.innerText = "🌙 MODO STANDBY"; }
        });

        function cmd(c, v) { 
            db.ref(`volarq/device01/comandos/${c}`).set(v); 
            if(c === 'silenciar') setTimeout(() => db.ref(`volarq/device01/comandos/silenciar`).set(false), 15000);
        }

        function toggleStby() {
            const isAct = document.getElementById("stbyBtn").classList.contains("stby-active");
            db.ref("volarq/device01/comandos/standby").set(!isAct);
        }

        function downloadCSV() {
            const blob = new Blob(["Hora,MQ2,Optico,Fogo\n" + csvData.join("\n")], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'relatorio_volarq.csv';
            a.click();
        }
    </script>
</body>
</html>
