<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VOLARQ INDUSTRIAL | PRO FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0c10; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; }
        .card { background: #12151c; border: 1px solid #232a35; padding: 30px; border-radius: 20px; display: inline-block; width: 280px; margin: 15px; }
        .val { font-family: 'Orbitron'; font-size: 3rem; color: #00f2ff; transition: 0.5s; }
        .btn { padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 260px; margin: 10px; font-size: 1rem; text-transform: uppercase; }
        
        /* Cores de Estado */
        .btn-stby-on { background: #ff3e3e; color: white; box-shadow: 0 0 20px rgba(255, 62, 62, 0.4); }
        .btn-normal { background: #232a35; color: #8b949e; }
        .btn-silence { background: #d29922; color: white; }
        .btn-test { background: #00c853; color: white; }

        #alertaBox { 
            display: none; background: rgba(255, 62, 62, 0.15); border: 2px solid #ff3e3e; 
            padding: 25px; border-radius: 15px; font-family: 'Orbitron'; margin-bottom: 30px;
            animation: pulse 1s infinite; font-size: 1.5rem; color: #ff3e3e;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        #statusCon { font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="statusCon">SISTEMA: <span id="labelStatus" style="color: #ff3e3e;">CARREGANDO...</span></div>
    <h1 style="font-family: 'Orbitron'; letter-spacing: 4px; color: #00f2ff;">VOLARQ INDUSTRIAL</h1>

    <div id="alertaBox">⚠️ ALERTA: INCÊNDIO DETECTADO ⚠️</div>

    <div class="card">
        <span style="color: #8b949e; font-size: 12px;">SENSOR MQ2</span>
        <div id="vMQ2" class="val">0</div>
    </div>
    <div class="card">
        <span style="color: #8b949e; font-size: 12px;">SENSOR ÓPTICO</span>
        <div id="vOpt" class="val" style="color: #ff0055;">0</div>
    </div>

    <br>
    <button class="btn btn-test" onclick="cmd('teste_buzzer', true)">🔊 TESTAR BUZZER LOCAL</button><br>
    <button id="btnS" class="btn btn-silence" onclick="silenciar()">🔕 SILENCIAR ALERTA (1 MIN)</button><br>
    <button id="btnSt" class="btn btn-normal" onclick="toggleStby()">🌙 MODO STANDBY</button>

    <script>
        const config = { databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let standbyAtivo = false;

        // --- LÓGICA DE MONITORAMENTO ---
        db.ref("volarq/device01").on("value", snap => {
            const d = snap.val();
            const now = Date.now();
            const lastCheck = d.status?.ultimo_check || 0;

            // WATCHDOG: Se não houver sinal por 10 segundos, zera tudo
            if (now - lastCheck > 10000) {
                document.getElementById("vMQ2").innerText = "0";
                document.getElementById("vOpt").innerText = "0";
                document.getElementById("labelStatus").innerText = "OFFLINE";
                document.getElementById("labelStatus").style.color = "#ff3e3e";
                document.getElementById("alertaBox").style.display = "none";
                return;
            }

            document.getElementById("labelStatus").innerText = "ONLINE";
            document.getElementById("labelStatus").style.color = "#00c853";
            document.getElementById("vMQ2").innerText = d.sensores.mq2;
            document.getElementById("vOpt").innerText = d.sensores.optico;

            // Lógica do Alerta (Só aparece se Fogo for true E não estiver em silêncio/standby)
            const emFogo = d.alerta?.fogo || false;
            const silenciado = d.comandos?.silenciar || false;
            standbyAtivo = d.comandos?.standby || false;

            if (emFogo && !silenciado && !standbyAtivo) {
                document.getElementById("alertaBox").style.display = "block";
            } else {
                document.getElementById("alertaBox").style.display = "none";
            }

            // Estilo do Botão Standby
            const btnSt = document.getElementById("btnSt");
            btnSt.className = standbyAtivo ? "btn btn-stby-on" : "btn btn-normal";
            btnSt.innerText = standbyAtivo ? "☀️ DESATIVAR STANDBY" : "🌙 MODO STANDBY";
        });

        // --- FUNÇÕES DE COMANDO ---
        function cmd(campo, valor) {
            db.ref(`volarq/device01/comandos/${campo}`).set(valor);
        }

        function silenciar() {
            cmd('silenciar', true);
            const btn = document.getElementById("btnS");
            btn.innerText = "SILENCIADO (1 min)";
            btn.style.opacity = "0.5";
            btn.disabled = true;

            setTimeout(() => {
                cmd('silenciar', false);
                btn.innerText = "🔕 SILENCIAR ALERTA (1 MIN)";
                btn.style.opacity = "1";
                btn.disabled = false;
            }, 60000);
        }

        function toggleStby() {
            cmd('standby', !standbyAtivo);
        }
    </script>
</body>
</html>
