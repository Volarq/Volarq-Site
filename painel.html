<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLARQ INDUSTRIAL | Monitoramento</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Paleta Volarq: Azul Marinho (#121d2f), Laranja (#ff8c00), Branco (#ffffff) */
        
        body {
            background-color: #121d2f;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #ffffff;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 10px 0;
        }

        .highlight-orange {
            color: #ff8c00;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* Estilização dos Cards */
        .card {
            background: #1c293e;
            padding: 20px 25px;
            margin-bottom: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid #ff8c00;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #a0aec0;
            font-weight: bold;
        }

        .valor {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ff8c00;
        }

        /* Alerta de Incêndio */
        #alerta-container {
            width: 100%;
            margin: 10px 0;
            min-height: 50px;
        }

        .alerta-box {
            background-color: #e53e3e;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            animation: pulse-red 1s infinite;
        }

        /* Gráfico */
        .chart-container {
            background: #1c293e;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(229, 62, 62, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229, 62, 62, 0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
            .valor { font-size: 1.8rem; }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>VOLARQ <span class="highlight-orange">INDUSTRIAL</span></h1>
        <p style="color: #a0aec0; font-size: 0.9rem;">Monitoramento de Sensores em Tempo Real</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="label">Gás & Fumaça (MQ2)</div>
            <div class="valor" id="mq2">0</div>
        </div>

        <div class="card">
            <div class="label">Sensor Óptico</div>
            <div class="valor" id="optico">0</div>
        </div>

        <div id="alerta-container"></div>

        <div class="chart-container">
            <canvas id="grafico"></canvas>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAG_wJMJhJWW-L9HQlCxaSdJLJAF4FN688",
            databaseURL: "https://volarq-demo-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- CONFIGURAÇÃO DO GRÁFICO (CHART.JS) ---
        const ctx = document.getElementById('grafico').getContext('2d');
        const maxPontos = 10;
        let labels = [];
        let dataMQ2 = [];
        let dataOptico = [];

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'MQ2',
                        borderColor: '#ff8c00',
                        backgroundColor: 'rgba(255, 140, 0, 0.1)',
                        data: dataMQ2,
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    },
                    {
                        label: 'Óptico',
                        borderColor: '#ffffff',
                        borderDash: [5, 5],
                        data: dataOptico,
                        borderWidth: 2,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { 
                        beginAtZero: true,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#a0aec0' }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#a0aec0' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#ffffff', font: { size: 12 } } }
                }
            }
        });

        // --- LÓGICA DE DADOS EM TEMPO REAL ---

        // Escutar Sensores
        db.ref("volarq/device01/sensores").on("value", (snap) => {
            const dados = snap.val();
            if (dados) {
                const agora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                // Atualizar números na tela
                document.getElementById("mq2").innerText = dados.mq2;
                document.getElementById("optico").innerText = dados.optico;

                // Atualizar Gráfico
                if (labels.length >= maxPontos) {
                    labels.shift();
                    dataMQ2.shift();
                    dataOptico.shift();
                }

                labels.push(agora);
                dataMQ2.push(dados.mq2);
                dataOptico.push(dados.optico);

                chart.update();
            }
        });

        // Escutar Alerta de Fogo
        db.ref("volarq/device01/alerta/fogo").on("value", (snap) => {
            const container = document.getElementById("alerta-container");
            if (snap.val() === true) {
                container.innerHTML = <div class="alerta-box">⚠️ INCÊNDIO DETECTADO ⚠️</div>;
            } else {
                container.innerHTML = "";
            }
        });

    </script>
</body>
</html>
